<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brioo · Website UI Kit</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #060608;
      color: #fff;
      overflow-x: hidden;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a1e;
    }
    ::-webkit-scrollbar-thumb {
      background: #c7a17a;
      border-radius: 8px;
    }

    /* marquee animation */
    @keyframes briooMarquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .marquee-track {
      animation: briooMarquee 25s linear infinite;
      display: inline-flex;
      white-space: nowrap;
    }

    /* glassmorphism helper */
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s ease;
    }
    .glass-card:hover {
      border-color: rgba(199,161,122,0.5);
      background: rgba(255,255,255,0.06);
      transform: translateY(-4px);
    }

    /* custom button */
    .btn-primary {
      background: #c7a17a;
      color: #060608;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 40px;
      transition: 0.25s;
      display: inline-block;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary:hover {
      background: #dfb48a;
      transform: scale(1.02);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(199,161,122,0.6);
      color: #c7a17a;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 500;
      transition: 0.25s;
    }
    .btn-outline:hover {
      background: rgba(199,161,122,0.1);
      border-color: #c7a17a;
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React & Babel (standalone) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel">
  // --------------------------------------------------------------
  // COMPONENTS: Brioo UI Kit
  // --------------------------------------------------------------

  // Navigation Bar
  const WebNav = () => {
    const [isOpen, setIsOpen] = React.useState(false);
    return (
      <nav style={{ padding: '1.5rem 2rem', maxWidth: '1400px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ fontSize: '1.8rem', fontWeight: 700, letterSpacing: '-0.02em', fontFamily: "'Playfair Display', serif" }}>
          Brioo<span style={{ color: '#c7a17a' }}>.</span>
        </div>
        <div style={{ display: 'flex', gap: '2.5rem', alignItems: 'center' }} className="nav-links">
          <a href="#" style={{ fontWeight: 500 }}>Work</a>
          <a href="#" style={{ fontWeight: 500 }}>Services</a>
          <a href="#" style={{ fontWeight: 500 }}>Studio</a>
          <a href="#" style={{ fontWeight: 500 }}>Insights</a>
          <button className="btn-primary" style={{ padding: '8px 22px' }}>Contact</button>
        </div>
      </nav>
    );
  };

  // Hero Section
  const Hero = () => {
    return (
      <section style={{ maxWidth: '1200px', margin: '4rem auto 0 auto', padding: '2rem', textAlign: 'center' }}>
        <span style={{ background: 'rgba(199,161,122,0.15)', padding: '0.3rem 1rem', borderRadius: '40px', fontSize: '0.85rem', fontWeight: 500, color: '#c7a17a', display: 'inline-block', marginBottom: '2rem' }}>✦ Digital craft since 2020</span>
        <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(3rem, 8vw, 5.5rem)', fontWeight: 700, lineHeight: 1.1, letterSpacing: '-0.02em', maxWidth: '1000px', margin: '0 auto' }}>
          Where design meets <span style={{ color: '#c7a17a', fontStyle: 'italic' }}>intelligence</span>
        </h1>
        <p style={{ fontSize: '1.2rem', color: '#aaa', maxWidth: '550px', margin: '1.8rem auto 2.2rem', lineHeight: 1.5 }}>
          We build exceptional digital experiences that feel human, fast, and timeless.
        </p>
        <div style={{ display: 'flex', gap: '1.2rem', justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn-primary">Launch a project →</button>
          <button className="btn-outline">Explore work</button>
        </div>
      </section>
    );
  };

  // Marquee (scrolling brand strip)
  const Marquee = () => {
    const marqueeText = ['✦ STRATEGY', '✦ BRANDING', '✦ INTERACTION', '✦ WEBFLOW', '✦ UI/UX', '✦ AI TOOLS', '✦ MOTION'];
    const doubled = [...marqueeText, ...marqueeText];
    return (
      <div style={{ margin: '6rem 0 4rem 0', overflow: 'hidden', background: 'rgba(255,255,255,0.02)', padding: '1.5rem 0', borderTop: '1px solid rgba(255,255,255,0.05)', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
        <div className="marquee-track" style={{ display: 'flex', gap: '3rem', whiteSpace: 'nowrap' }}>
          {doubled.map((item, idx) => (
            <span key={idx} style={{ fontSize: '1.2rem', fontWeight: 500, letterSpacing: '0.02em', color: '#ddd', fontFamily: "'DM Sans', sans-serif" }}>{item}</span>
          ))}
        </div>
      </div>
    );
  };

  // Services grid
  const Services = () => {
    const serviceList = [
      { title: 'Product Design', desc: 'End-to-end product experiences that users love.', icon: '🎯' },
      { title: 'Brand Identity', desc: 'Distinctive visual language & strategy.', icon: '✨' },
      { title: 'Web Development', desc: 'Fast, responsive, future-proof websites.', icon: '⚡' },
      { title: 'AI Integration', desc: 'Intelligent features that elevate usability.', icon: '🧠' },
    ];
    return (
      <section style={{ maxWidth: '1300px', margin: '5rem auto', padding: '2rem' }}>
        <div style={{ textAlign: 'center', marginBottom: '3rem' }}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: '2.8rem', fontWeight: 700 }}>Our <span style={{ color: '#c7a17a' }}>craft</span></h2>
          <p style={{ color: '#aaa', marginTop: '0.8rem' }}>Human‑centered solutions, powered by creativity.</p>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: '2rem' }}>
          {serviceList.map((service, idx) => (
            <div key={idx} className="glass-card" style={{ padding: '2rem 1.5rem', borderRadius: '28px', textAlign: 'center' }}>
              <div style={{ fontSize: '2.5rem', marginBottom: '1rem' }}>{service.icon}</div>
              <h3 style={{ fontSize: '1.6rem', fontFamily: "'Playfair Display', serif", marginBottom: '0.7rem' }}>{service.title}</h3>
              <p style={{ color: '#bbb', lineHeight: 1.5 }}>{service.desc}</p>
            </div>
          ))}
        </div>
      </section>
    );
  };

  // Interactive PathToggle (segmented control that changes content)
  const PathToggle = () => {
    const [activePath, setActivePath] = React.useState('design');
    return (
      <section style={{ maxWidth: '1100px', margin: '5rem auto', padding: '2rem' }}>
        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: '2.5rem' }}>Choose your <span style={{ color: '#c7a17a' }}>path</span></h2>
          <p style={{ color: '#aaa' }}>Different tracks, same obsession for quality.</p>
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', gap: '1rem', marginBottom: '3rem' }}>
          <button 
            onClick={() => setActivePath('design')}
            style={{ background: activePath === 'design' ? '#c7a17a' : 'transparent', color: activePath === 'design' ? '#060608' : '#fff', border: '1px solid rgba(199,161,122,0.5)', padding: '10px 30px', borderRadius: '40px', fontWeight: 600, cursor: 'pointer' }}
          >
            Design Path
          </button>
          <button 
            onClick={() => setActivePath('dev')}
            style={{ background: activePath === 'dev' ? '#c7a17a' : 'transparent', color: activePath === 'dev' ? '#060608' : '#fff', border: '1px solid rgba(199,161,122,0.5)', padding: '10px 30px', borderRadius: '40px', fontWeight: 600, cursor: 'pointer' }}
          >
            Development Path
          </button>
        </div>
        <div className="glass-card" style={{ padding: '2.5rem', borderRadius: '32px', textAlign: 'center' }}>
          {activePath === 'design' ? (
            <>
              <div style={{ fontSize: '3rem' }}>🎨</div>
              <h3 style={{ fontSize: '1.8rem', margin: '1rem 0' }}>Human‑first design thinking</h3>
              <p style={{ color: '#ccc', maxWidth: '550px', margin: '0 auto' }}>We run workshops, prototypes, and iterative testing. Our design system scales beautifully.</p>
              <button className="btn-outline" style={{ marginTop: '1.8rem' }}>Explore case studies →</button>
            </>
          ) : (
            <>
              <div style={{ fontSize: '3rem' }}>⚡</div>
              <h3 style={{ fontSize: '1.8rem', margin: '1rem 0' }}>Modern web engineering</h3>
              <p style={{ color: '#ccc', maxWidth: '550px', margin: '0 auto' }}>React, performant animations, headless CMS, and full‑stack solutions with soul.</p>
              <button className="btn-outline" style={{ marginTop: '1.8rem' }}>See tech stack →</button>
            </>
          )}
        </div>
      </section>
    );
  };

  // Footer
  const WebFooter = () => {
    return (
      <footer style={{ borderTop: '1px solid rgba(255,255,255,0.08)', marginTop: '4rem', padding: '3rem 2rem 2rem', background: '#050507' }}>
        <div style={{ maxWidth: '1300px', margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px,1fr))', gap: '2rem' }}>
          <div>
            <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: '1.7rem', marginBottom: '0.8rem' }}>Brioo<span style={{ color: '#c7a17a' }}>.</span></h3>
            <p style={{ color: '#888', fontSize: '0.9rem' }}>Digital craft studio</p>
          </div>
          <div>
            <h4 style={{ fontWeight: 600, marginBottom: '1rem' }}>Explore</h4>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Work</a></p>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Services</a></p>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Journal</a></p>
          </div>
          <div>
            <h4 style={{ fontWeight: 600, marginBottom: '1rem' }}>Connect</h4>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>hello@brioo.studio</a></p>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Instagram</a></p>
            <p><a href="#" style={{ color: '#aaa', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>LinkedIn</a></p>
          </div>
        </div>
        <div style={{ textAlign: 'center', marginTop: '3rem', color: '#555', fontSize: '0.75rem', borderTop: '1px solid rgba(255,255,255,0.04)', paddingTop: '1.8rem' }}>
          © 2026 Brioo — All rights reserved.
        </div>
      </footer>
    );
  };

  // Main App composition
  const Site = () => {
    return (
      <>
        <WebNav />
        <Hero />
        <Marquee />
        <Services />
        <PathToggle />
        <WebFooter />
      </>
    );
  };

  // Render into root
  ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
</script>
</body>
</html>
